# Cluster workload scenarios for real workload-derived kernel benchmark scenarios.
# Workload names resolve through bench/utils/workloads.py and real_prompts.py.

models:
  - key: llama31-8b
    hf_name: meta-llama/Llama-3.1-8B-Instruct
    tp: 1
    dtype: bfloat16
    num_requests: 100
    workloads:
      - name: prefill-heavy
      - name: decode-heavy

  - key: gpt-oss-120b
    hf_name: openai/gpt-oss-120b
    tp: 2
    dtype: mxfp4
    num_requests: 100
    workloads:
      - name: prefill-heavy
      - name: decode-heavy

  - key: gla-2.7b-100b
    hf_name: fla-hub/gla-2.7B-100B
    tp: 1
    dtype: bfloat16
    num_requests: 100
    workloads:
      - name: prefill-heavy
      - name: decode-heavy

  - key: flux1-dev
    hf_name: black-forest-labs/FLUX.1-dev
    tp: 1
    dtype: bfloat16
    workloads:
      - name: 1024x1024
      - name: 512x512

  - key: qwen3-vl-235b-a22b-fp8
    hf_name: Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
    tp: 4
    dtype: fp8
    num_requests: 100
    workloads:
      - name: text-only
      - name: image
      - name: video

  - key: yolov1on
    hf_name: jameslahm/yolov1On
    tp: 1
    dtype: bfloat16
    workloads:
      - name: coco-val

  - key: openfold3
    hf_name: OpenFold/OpenFold3
    tp: 1
    dtype: bfloat16
    workloads:
      - name: short
      - name: medium
      - name: long
      - name: extra-long

  - key: bge-m3
    hf_name: BAAI/bge-m3
    tp: 1
    dtype: bfloat16
    workloads:
      - name: bge-m3-mldr-docs

  - key: oasis-500m
    hf_name: Etched/oasis-500m
    tp: 1
    dtype: float16
    workloads:
      - name: short-bs4-16f-4ddim
      - name: medium-bs8-24f-4ddim
      - name: long-bs8-32f-4ddim
      - name: denoise-bs4-16f-8ddim
