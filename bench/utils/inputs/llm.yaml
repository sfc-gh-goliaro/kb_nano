rotary_emb:
  scenarios:
    - name: "llama31-8b/decode-bs1/tp1"
      init_args:
        head_size: 128
        rotary_dim: 128
        max_position_embeddings: 131072
        base: 500000
        is_neox_style: true
      inputs:
        positions: {shape: [1], dtype: int64}
        query: {shape: [1, 32, 128], dtype: bfloat16}
        key: {shape: [1, 8, 128], dtype: bfloat16}
    - name: "llama31-8b/decode-bs32/tp1"
      init_args:
        head_size: 128
        rotary_dim: 128
        max_position_embeddings: 131072
        base: 500000
