      inputs:
        positions: {shape: [32], dtype: int64}
        query: {shape: [32, 32, 128], dtype: bfloat16}
        key: {shape: [32, 8, 128], dtype: bfloat16}
    - name: "llama31-8b/prefill-512/tp1"
      init_args:
        head_size: 128
        rotary_dim: 128
        max_position_embeddings: 131072
        base: 500000
