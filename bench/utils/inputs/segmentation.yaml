# Kernel benchmark scenarios for SAM3 segmentation model operators.
# img_size=1008, patch_size=14 => spatial=72x72=5184 tokens
# d_model=256, embed_dim=1024, vit_heads=16, head_dim=64
# text: width=1024, heads=16, context_length=32

sam3_position_encoding:
  scenarios:
    - name: "sam3/fpn-scale4/tp1"
      init_args:
        d_model: 256
      inputs:
        x: {shape: [1, 256, 288, 288], dtype: float32}
    - name: "sam3/fpn-scale1/tp1"
      init_args:
        d_model: 256
      inputs:
        x: {shape: [1, 256, 72, 72], dtype: float32}

sam3_rope:
  scenarios:
    - name: "sam3/window-14x14/tp1"
      init_args:
        head_dim: 64
        input_size: [14, 14]
        theta: 10000.0
        tiled: true
        pt_size: [14, 14]
      inputs:
        q: {shape: [1, 16, 196, 64], dtype: bfloat16}
        k: {shape: [1, 16, 196, 64], dtype: bfloat16}
    - name: "sam3/global-72x72/tp1"
      init_args:
        head_dim: 64
        input_size: [72, 72]
        theta: 10000.0
        tiled: true
        pt_size: [14, 14]
      inputs:
        q: {shape: [1, 16, 5184, 64], dtype: bfloat16}
        k: {shape: [1, 16, 5184, 64], dtype: bfloat16}

sam3_vit_attention:
  scenarios:
    - name: "sam3/window-attn/tp1"
      init_args:
        dim: 1024
        num_heads: 16
        use_rope: true
        input_size: [14, 14]
        rope_tiled: true
        rope_pt_size: [14, 14]
      inputs:
        x: {shape: [1, 14, 14, 1024], dtype: bfloat16}
    - name: "sam3/global-attn/tp1"
      init_args:
        dim: 1024
        num_heads: 16
        use_rope: true
        input_size: [72, 72]
        rope_tiled: true
        rope_pt_size: [14, 14]
      inputs:
        x: {shape: [1, 72, 72, 1024], dtype: bfloat16}

sam3_vit_mlp:
  scenarios:
    - name: "sam3/vit-mlp-window/tp1"
      init_args:
        in_features: 1024
        hidden_features: 4096
      inputs:
        x: {shape: [1, 196, 1024], dtype: bfloat16}
    - name: "sam3/vit-mlp-global/tp1"
      init_args:
        in_features: 1024
        hidden_features: 4096
      inputs:
        x: {shape: [1, 5184, 1024], dtype: bfloat16}

sam3_text_attention:
  scenarios:
    - name: "sam3/text-block-bs1/tp1"
      init_args:
        d_model: 1024
        n_head: 16
      inputs:
        x: {shape: [1, 32, 1024], dtype: bfloat16}
    - name: "sam3/text-block-bs4/tp1"
      init_args:
        d_model: 1024
        n_head: 16
      inputs:
        x: {shape: [4, 32, 1024], dtype: bfloat16}

sam3_cross_attention:
  scenarios:
    - name: "sam3/encoder-cross-attn/tp1"
      init_args:
        d_model: 256
        n_head: 8
      inputs:
        query: {shape: [1, 5184, 256], dtype: bfloat16}
        key: {shape: [1, 32, 256], dtype: bfloat16}
        value: {shape: [1, 32, 256], dtype: bfloat16}
    - name: "sam3/decoder-cross-attn/tp1"
      init_args:
        d_model: 256
        n_head: 8
      inputs:
        query: {shape: [1, 200, 256], dtype: bfloat16}
        key: {shape: [1, 5184, 256], dtype: bfloat16}
        value: {shape: [1, 5184, 256], dtype: bfloat16}

sam3_mask_predictor:
  scenarios:
    - name: "sam3/mask-pred-bs1/tp1"
      init_args:
        hidden_dim: 256
        mask_dim: 256
      inputs:
        obj_queries: {shape: [1, 200, 256], dtype: bfloat16}
        pixel_embed: {shape: [1, 256, 288, 288], dtype: bfloat16}

sam3_encoder_layer:
  scenarios:
    - name: "sam3/encoder-layer/tp1"
      init_args:
        d_model: 256
        n_head: 8
        dim_feedforward: 2048
      inputs:
        tgt: {shape: [1, 5184, 256], dtype: bfloat16}
        memory: {shape: [1, 32, 256], dtype: bfloat16}

sam3_decoder_layer:
  scenarios:
    - name: "sam3/decoder-layer/tp1"
      init_args:
        d_model: 256
        n_head: 8
        dim_feedforward: 2048
      inputs:
        tgt: {shape: [1, 200, 256], dtype: bfloat16}
        memory: {shape: [1, 5184, 256], dtype: bfloat16}

sam3_pixel_decoder:
  scenarios:
    - name: "sam3/pixel-decoder/tp1"
      init_args:
        hidden_dim: 256
        num_upsampling_stages: 3
      inputs:
        backbone_feats:
          - {shape: [1, 256, 288, 288], dtype: bfloat16}
          - {shape: [1, 256, 144, 144], dtype: bfloat16}
          - {shape: [1, 256, 72, 72], dtype: bfloat16}
          - {shape: [1, 256, 36, 36], dtype: bfloat16}
