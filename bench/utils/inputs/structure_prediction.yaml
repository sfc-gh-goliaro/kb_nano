# Input scenarios for OpenFold3 / AlphaFold3 kernel benchmarks.
# Shapes based on default model config: c_s=384, c_z=128, c_m=64,
# c_token_diffusion=768. Token counts span small (128) to large (512).

openfold3_triangle_multiplication:
  scenarios:
    - name: "openfold3/pairformer-out-small/tp1"
      init_args:
        c_z: 128
        c_hidden: 128
        _outgoing: true
      inputs:
        z: {shape: [1, 128, 128, 128], dtype: bfloat16}
        mask: {shape: [1, 128, 128], dtype: float32}
    - name: "openfold3/pairformer-out-medium/tp1"
      init_args:
        c_z: 128
        c_hidden: 128
        _outgoing: true
      inputs:
        z: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 256, 256], dtype: float32}
    - name: "openfold3/pairformer-in-medium/tp1"
      init_args:
        c_z: 128
        c_hidden: 128
        _outgoing: false
      inputs:
        z: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 256, 256], dtype: float32}
    - name: "openfold3/pairformer-out-large/tp1"
      init_args:
        c_z: 128
        c_hidden: 128
        _outgoing: true
      inputs:
        z: {shape: [1, 512, 512, 128], dtype: bfloat16}
        mask: {shape: [1, 512, 512], dtype: float32}

openfold3_triangle_attention:
  scenarios:
    - name: "openfold3/pairformer-start-small/tp1"
      init_args:
        c_in: 128
        c_hidden: 32
        no_heads: 4
        starting: true
      inputs:
        x: {shape: [1, 128, 128, 128], dtype: bfloat16}
        mask: {shape: [1, 128, 128], dtype: float32}
    - name: "openfold3/pairformer-start-medium/tp1"
      init_args:
        c_in: 128
        c_hidden: 32
        no_heads: 4
        starting: true
      inputs:
        x: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 256, 256], dtype: float32}
    - name: "openfold3/pairformer-end-medium/tp1"
      init_args:
        c_in: 128
        c_hidden: 32
        no_heads: 4
        starting: false
      inputs:
        x: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 256, 256], dtype: float32}

openfold3_outer_product_mean:
  scenarios:
    - name: "openfold3/msa-module-small/tp1"
      init_args:
        c_m: 64
        c_z: 128
        c_hidden: 32
      inputs:
        m: {shape: [1, 128, 128, 64], dtype: bfloat16}
        mask: {shape: [1, 128, 128], dtype: float32}
    - name: "openfold3/msa-module-medium/tp1"
      init_args:
        c_m: 64
        c_z: 128
        c_hidden: 32
      inputs:
        m: {shape: [1, 512, 256, 64], dtype: bfloat16}
        mask: {shape: [1, 512, 256], dtype: float32}

openfold3_swiglu:
  scenarios:
    - name: "openfold3/pairformer-single-transition/tp1"
      init_args:
        c_in: 384
        n: 4
      inputs:
        x: {shape: [1, 256, 384], dtype: bfloat16}
    - name: "openfold3/pair-transition/tp1"
      init_args:
        c_in: 128
        n: 4
      inputs:
        x: {shape: [1, 256, 128], dtype: bfloat16}
    - name: "openfold3/diffusion-transition/tp1"
      init_args:
        c_in: 768
        n: 2
      inputs:
        x: {shape: [1, 256, 768], dtype: bfloat16}

openfold3_attention:
  scenarios:
    - name: "openfold3/pairformer-pair-bias/tp1"
      init_args:
        c_q: 384
        c_k: 384
        c_v: 384
        c_hidden: 32
        no_heads: 16
      inputs:
        q_x: {shape: [1, 256, 384], dtype: bfloat16}
        kv_x: {shape: [1, 256, 384], dtype: bfloat16}
    - name: "openfold3/diffusion-attn/tp1"
      init_args:
        c_q: 768
        c_k: 768
        c_v: 768
        c_hidden: 48
        no_heads: 16
      inputs:
        q_x: {shape: [1, 256, 768], dtype: bfloat16}
        kv_x: {shape: [1, 256, 768], dtype: bfloat16}

openfold3_pair_block:
  scenarios:
    - name: "openfold3/pairformer-pair-small/tp1"
      init_args:
        c_z: 128
        c_hidden_mul: 128
        c_hidden_pair_att: 32
        no_heads_pair: 4
        transition_n: 4
      inputs:
        z: {shape: [1, 128, 128, 128], dtype: bfloat16}
        pair_mask: {shape: [1, 128, 128], dtype: float32}
    - name: "openfold3/pairformer-pair-medium/tp1"
      init_args:
        c_z: 128
        c_hidden_mul: 128
        c_hidden_pair_att: 32
        no_heads_pair: 4
        transition_n: 4
      inputs:
        z: {shape: [1, 256, 256, 128], dtype: bfloat16}
        pair_mask: {shape: [1, 256, 256], dtype: float32}

openfold3_attention_pair_bias:
  scenarios:
    - name: "openfold3/pairformer-single-update/tp1"
      init_args:
        c_q: 384
        c_s: 384
        c_z: 128
        c_hidden: 32
        no_heads: 16
      inputs:
        a: {shape: [1, 256, 384], dtype: bfloat16}
        z: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 256], dtype: float32}

openfold3_msa_attention:
  scenarios:
    - name: "openfold3/msa-row-att/tp1"
      init_args:
        c_m: 64
        c_z: 128
        c_hidden: 8
        no_heads: 8
      inputs:
        m: {shape: [1, 128, 256, 64], dtype: bfloat16}
        z: {shape: [1, 256, 256, 128], dtype: bfloat16}
        mask: {shape: [1, 128, 256], dtype: float32}
